name: AppClaw Flows

on:
  workflow_dispatch:
    inputs:
      flow:
        description: 'Flow file to run (relative to flows/, leave empty to run all)'
        type: string
        default: ''
  push:
    paths:
      - 'flows/**'

jobs:
  appclaw:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4   # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          # appclaw's deps (ai-sdk-ollama, pipenet) require node >=22.
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # appclaw's published dependency df-vision was unpublished from npm, so
      # `npm i -g appclaw` fails. scripts/appclaw.sh installs it into .appclaw-cli
      # with df-vision overridden to the vendored stub (see the script header).
      # Running --help here installs it and fails fast (before booting the
      # emulator) if anything is wrong.
      - name: Install AppClaw CLI
        run: bash scripts/appclaw.sh --help >/dev/null && echo "✓ appclaw installed"

      # apps/*.apk is git-ignored — fetch the WebdriverIO demo app for the run.
      - name: Download demo app
        run: |
          mkdir -p apps
          curl -L -o apps/demo.apk \
            "$(curl -s https://api.github.com/repos/webdriverio/native-demo-app/releases/latest | grep -o 'https://[^"]*\.apk')"
          unzip -l apps/demo.apk >/dev/null && echo "✓ apps/demo.apk ready"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run AppClaw flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          avd-name: appclaw_avd
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          # appclaw usage is `appclaw --flow <file.yaml>` (the file is the value of
          # --flow; there is no --file option). scripts/appclaw.sh execs the CLI
          # installed above; APP_PATH/DEVICE_UDID come from the step env below.
          script: |
            if [ -n "${{ github.event.inputs.flow }}" ]; then
              bash scripts/appclaw.sh --flow "flows/${{ github.event.inputs.flow }}"
            else
              for flow in flows/*.yaml flows/*.yml; do
                [ -f "$flow" ] || continue
                echo "Running flow: $flow"
                bash scripts/appclaw.sh --flow "$flow"
              done
            fi
        env:
          # YAML flows are deterministic (zero LLM calls). These only apply if a
          # dom-agent fallback is invoked — pointed at a local Ollama model, no cloud key.
          LLM_PROVIDER: ollama
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: llama3.1
          APP_PATH: apps/demo.apk
          DEVICE_UDID: emulator-5554

      - name: Upload AppClaw artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appclaw-results
          path: |
            appclaw-results/
            screen-*.png
          retention-days: 7
