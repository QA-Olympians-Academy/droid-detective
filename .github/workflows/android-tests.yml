name: Android Tests

on:
  # push:
  #   branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      self_heal:
        description: 'Run self-healing on failures'
        type: boolean
        default: true
      model:
        description: 'Ollama model for self-healing & failure analysis'
        type: string
        # A light (~2 GB) model that fits alongside the emulator on the runner —
        # a 7B model OOMs (llama-server segfaults). The deterministic DOM-based
        # fallback in heal-and-retry.js backstops accuracy, so model size matters
        # less than not crashing. Pick a bigger model here only for local runs.
        default: llama3.2:3b

# GITHUB_TOKEN scopes the jobs need: the analyzer opens issues, review-locators
# comments on PRs. Without this the token is read-only and `gh issue create`
# fails with "Resource not accessible by integration".
permissions:
  contents: write        # self-heal commits the patched selectors back to the PR branch
  issues: write
  pull-requests: write

env:
  # Model comes from the workflow_dispatch input; on pull_request runs (where the
  # input is absent) it falls back to the default. Used by the pull step, the
  # cache key, and the LLM_MODEL passed to the heal/analyse/review scripts.
  LLM_MODEL: ${{ inputs.model || 'llama3.2:3b' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # Check out the PR HEAD BRANCH (not the detached merge ref) with full
      # history, so the self-heal step can commit its patch and push it back.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4   # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Appium drivers
        run: pnpm appium:install-driver

      # apps/*.apk is git-ignored, so fetch the WebdriverIO demo app for the test run.
      - name: Download demo app
        run: |
          mkdir -p apps
          curl -L -o apps/demo.apk \
            "$(curl -s https://api.github.com/repos/webdriverio/native-demo-app/releases/latest | grep -o 'https://[^"]*\.apk')"
          unzip -l apps/demo.apk >/dev/null && echo "✓ apps/demo.apk ready"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Ollama must be up BEFORE the emulator step so self-healing (which runs
      # INSIDE that step) can reach it. Local models run on CPU in CI (slow).
      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.LLM_MODEL }}

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull "$LLM_MODEL"

      - name: Run Android tests (heal on failure)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          avd-name: test_avd
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          # Heal INSIDE the emulator action: only here are adb, the live DOM dump,
          # and the `pnpm test` retry able to see a running device. The step's
          # outcome reflects the POST-heal result (green if healing recovered).
          script: pnpm test || node .github/scripts/heal-and-retry.js
        env:
          LLM_BASE_URL: http://localhost:11434/v1
          # Skip example.spec.ts in CI (applies to the initial run and the heal retry).
          WDIO_EXCLUDE: specs/example.spec.ts
        continue-on-error: true
        id: run_tests

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            appium.log
            dom-snapshots/
            screen-*.png
            allure-results/
          retention-days: 7

      # If self-healing patched a page object, commit it back to the PR branch so
      # the fix lands in the PR for humans (and the reviewer below) to evaluate.
      # Same-repo PRs only (fork PRs get a read-only token and can't push).
      - name: Commit & push healed selectors to the PR
        id: heal_push
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ -n "$(git status --porcelain droid/pageobjects)" ]; then
            git config user.name  "droid-heal-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add droid/pageobjects
            git commit -m "fix(heal): auto-patch broken selectors"
            git push origin HEAD:${{ github.head_ref }}
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Pushed healed selectors to ${{ github.head_ref }}"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "No healed selector changes to push."
          fi

      # Review the selectors the healer just pushed. A GITHUB_TOKEN push does NOT
      # re-trigger CI, so we run the reviewer here in the same run, diffing the
      # heal commit itself: HEAD~1 (pre-heal) .. HEAD (heal).
      - name: Review the healed selectors
        if: steps.heal_push.outputs.pushed == 'true'
        run: node .github/scripts/review-locators.js
        env:
          LLM_BASE_URL: http://localhost:11434/v1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: HEAD~1
          HEAD_SHA: HEAD

      - name: Analyse failures and open issue
        if: steps.run_tests.outcome == 'failure' && github.ref == 'refs/heads/main'
        run: node .github/scripts/analyse-failures.js
        env:
          LLM_BASE_URL: http://localhost:11434/v1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Fail job if tests failed and healing did not recover
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

  review-locators:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: []

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4   # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Local models run on CPU in CI (no GPU), so inference is slow.
      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ env.LLM_MODEL }}

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull "$LLM_MODEL"

      - name: Review changed locators
        run: node .github/scripts/review-locators.js
        env:
          LLM_BASE_URL: http://localhost:11434/v1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
