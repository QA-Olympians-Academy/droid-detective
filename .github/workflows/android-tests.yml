name: Android Tests

on:
  # push:
  #   branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      self_heal:
        description: 'Run self-healing on failures'
        type: boolean
        default: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4   # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Appium drivers
        run: pnpm appium:install-driver

      # apps/*.apk is git-ignored, so fetch the WebdriverIO demo app for the test run.
      - name: Download demo app
        run: |
          mkdir -p apps
          curl -L -o apps/demo.apk \
            "$(curl -s https://api.github.com/repos/webdriverio/native-demo-app/releases/latest | grep -o 'https://[^"]*\.apk')"
          unzip -l apps/demo.apk >/dev/null && echo "✓ apps/demo.apk ready"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Ollama must be up BEFORE the emulator step so self-healing (which runs
      # INSIDE that step) can reach it. Local models run on CPU in CI (slow).
      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-llama3.2-3b

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2:3b

      - name: Run Android tests (heal on failure)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          avd-name: test_avd
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          # Heal INSIDE the emulator action: only here are adb, the live DOM dump,
          # and the `pnpm test` retry able to see a running device. The step's
          # outcome reflects the POST-heal result (green if healing recovered).
          script: pnpm test || node .github/scripts/heal-and-retry.js
        env:
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: llama3.2:3b
          # Skip example.spec.ts in CI (applies to the initial run and the heal retry).
          WDIO_EXCLUDE: specs/example.spec.ts
        continue-on-error: true
        id: run_tests

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            appium.log
            dom-snapshots/
            screen-*.png
            allure-results/
          retention-days: 7

      - name: Analyse failures and open issue
        if: steps.run_tests.outcome == 'failure' && github.ref == 'refs/heads/main'
        run: node .github/scripts/analyse-failures.js
        env:
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: llama3.2:3b
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Fail job if tests failed and healing did not recover
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

  review-locators:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: []

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4   # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Local models run on CPU in CI (no GPU), so inference is slow.
      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-llama3.2-3b

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2:3b

      - name: Review changed locators
        run: node .github/scripts/review-locators.js
        env:
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: llama3.2:3b
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
