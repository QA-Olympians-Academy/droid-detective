# .appclaw/env/dev.yaml
# Environment file for AppClaw — commit this file, but never put real values here.
# Secrets are resolved from shell environment variables at runtime.
# Values shown as *** in logs.

variables:
  app_name: demo
  platform: android

secrets:
  email: '${TEST_EMAIL}'        # export TEST_EMAIL=alice@example.com
  password: '${TEST_PASSWORD}'  # export TEST_PASSWORD=10203040
  new_email: '${TEST_NEW_EMAIL}'
