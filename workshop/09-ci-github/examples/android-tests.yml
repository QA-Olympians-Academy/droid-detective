name: Android Tests (Annotated Workshop Example)

# TRIGGER: runs on PRs to main, and on manual dispatch
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      self_heal:
        description: 'Run self-healing on failures'
        type: boolean
        default: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout the repo
      - uses: actions/checkout@v4

      # 2. Set up pnpm (must come before setup-node for caching to work)
      - uses: pnpm/action-setup@v4   # version comes from package.json "packageManager"

      # 3. Set up Node and restore pnpm cache
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 4. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Install the UIAutomator2 Appium driver
      - name: Install Appium driver
        run: pnpm appium:install-driver

      # 5b. apps/*.apk is git-ignored — fetch the WebdriverIO demo app for the run.
      - name: Download demo app
        run: |
          mkdir -p apps
          curl -L -o apps/demo.apk \
            "$(curl -s https://api.github.com/repos/webdriverio/native-demo-app/releases/latest | grep -o 'https://[^"]*\.apk')"
          unzip -l apps/demo.apk >/dev/null && echo "✓ apps/demo.apk ready"

      # 6. Enable KVM for hardware-accelerated emulation (Ubuntu only)
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # 6b. Install a local LLM (Ollama + llama3.1) BEFORE the emulator step so
      #     self-healing — which runs INSIDE that step — can reach it. No cloud
      #     key needed; on CI the model runs on CPU (no GPU), so it is slow.
      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-llama3.1

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.1

      # 7. Run tests and self-heal on failure — all INSIDE the emulator action,
      #    the only place adb, the live DOM dump, and the `pnpm test` retry can
      #    see a running device. continue-on-error keeps the job alive;
      #    run_tests.outcome reflects the POST-heal result (green if recovered).
      - name: Run Android tests (heal on failure)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          avd-name: test_avd
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: pnpm test || node .github/scripts/heal-and-retry.js
        env:
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: llama3.1
        continue-on-error: true
        id: run_tests

      # 8. Always upload screenshots and logs (even on failure)
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            appium.log
            screen-*.png
          retention-days: 7

      # 9. Open a GitHub issue with AI failure analysis (main branch only).
      #    This reads appium.log (a file) + calls the model — no device needed,
      #    so it correctly runs as a step after the emulator action.
      - name: Analyse failures and open issue
        if: steps.run_tests.outcome == 'failure' && github.ref == 'refs/heads/main'
        run: node .github/scripts/analyse-failures.js
        env:
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: llama3.1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # 11. Fail the job if tests failed and healing did not recover
      - name: Fail if not healed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

  # Separate job: review changed selectors in PRs
  review-locators:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed for git diff

      - uses: pnpm/action-setup@v4   # version comes from package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Install a local LLM (Ollama + llama3.1) for the review script.
      # No cloud key needed — models run locally. On CI they run on CPU
      # (no GPU), so inference is slow.
      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-llama3.1

      - name: Install Ollama and pull model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.1

      - name: Review changed locators
        run: node .github/scripts/review-locators.js
        env:
          LLM_BASE_URL: http://localhost:11434/v1
          LLM_MODEL: llama3.1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
